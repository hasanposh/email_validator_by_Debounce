<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Validator Pro</title>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: var(--bg); color: var(--text); }
    .container { max-width: 1100px; margin: 0 auto; }
    textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 20px; }
    .button-group { display: flex; gap: 10px; margin-bottom: 30px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-check { background: var(--primary); color: white; }
    .btn-excel { background: #16a34a; color: white; }
    .btn-download { background: #64748b; color: white; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    td, th { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
    th { background: #f1f5f9; }
    .status-safe { color: #16a34a; font-weight: bold; }
    .status-invalid { color: #dc2626; font-weight: bold; }
    .status-error { color: #94a3b8; font-style: italic; }
    .suggestion { color: var(--primary); font-size: 0.85em; display: block; margin-top: 4px; }
  </style>
</head>
<body>

<div class="container">
  <h2>Bulk Email Validator</h2>
  <textarea id="emails" placeholder="Paste emails here..."></textarea>

  <div class="button-group">
    <button class="btn-check" onclick="checkEmails()">Validate List</button>
    <button class="btn-excel" onclick="copyForExcel()">📋 Copy for Excel</button>
    <button class="btn-download" onclick="downloadCSV()">CSV</button>
    <button class="btn-download" onclick="downloadJSON()">JSON</button>
  </div>

  <table id="resultsTable">
    <thead>
      <tr>
        <th>Email</th>
        <th>Status</th>
        <th>Reason</th>
        <th>Free?</th>
        <th>Role?</th>
        <th>Country</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let latestResults = [];

async function checkEmails() {
  const emailInput = document.getElementById("emails").value;
  const btn = document.querySelector(".btn-check");
  if (!emailInput.trim()) return alert("Enter emails.");

  btn.innerText = "Processing..."; btn.disabled = true;

  try {
    const res = await fetch("/bulk-check", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ emails: emailInput })
    });
    const data = await res.json();
    latestResults = data.results;
    renderTable(data.results);
  } catch (err) { alert("Server error."); }
  finally { btn.innerText = "Validate List"; btn.disabled = false; }
}

function renderTable(data) {
  const tbody = document.querySelector("#resultsTable tbody");
  tbody.innerHTML = data.map(item => {
    let statusClass = item.result === "Safe to Send" ? "status-safe" : (item.result === "Invalid" ? "status-invalid" : "status-error");
    return `
      <tr>
        <td>
          ${item.email}
          ${item.did_you_mean ? `<span class="suggestion">Mean: ${item.did_you_mean}?</span>` : ""}
        </td>
        <td class="${statusClass}">${item.result}</td>
        <td>${item.reason || "-"}</td>
        <td>${item.free_email === "true" ? "Yes" : "No"}</td>
        <td>${item.role === "true" ? "Yes" : "No"}</td>
        <td>${item.country || "N/A"}</td>
      </tr>
    `;
  }).join("");
}

function copyForExcel() {
  if (!latestResults.length) return alert("No data.");
  const headers = ["email", "result", "reason", "country", "did_you_mean"];
  let tsv = headers.join("\t") + "\n";
  latestResults.forEach(item => {
    tsv += headers.map(h => item[h] || "N/A").join("\t") + "\n";
  });
  navigator.clipboard.writeText(tsv).then(() => alert("Copied for Excel! ✅"));
}

async function downloadCSV() {
  const res = await fetch("/download-csv", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(latestResults) });
  const blob = await res.blob();
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "emails.csv"; a.click();
}

async function downloadJSON() {
  const res = await fetch("/download-json", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(latestResults) });
  const blob = await res.blob();
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "emails.json"; a.click();
}
</script>
</body>
</html>
